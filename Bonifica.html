<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Cruscotto Punti per Colore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* Personalizzazione scrollbar per i registri */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-black mb-2 uppercase tracking-tight text-gray-900">Classifica Colori e Registri</h1>
        <p class="text-gray-600 mb-8 font-medium text-lg">Calcolo totale dei punti basato sul campo <code class="bg-gray-200 px-1 rounded">Idsquadra</code> dei ragazzi e cronologia completa del registro.</p>
        
        <div id="output" class="w-full"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYnV7Qqj_-iPLvE-KYXT1bCRbe_4seFaw",
            authDomain: "campopostcresima2026.firebaseapp.com",
            projectId: "campopostcresima2026",
            storageBucket: "campopostcresima2026.firebasestorage.app",
            messagingSenderId: "286625257910",
            appId: "1:286625257910:web:734565f023794171e08917"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Funzione per espandere/collassare la lista dei registri
        window.toggleLogs = function(colorId) {
            const el = document.getElementById(`logs-${colorId}`);
            const btn = document.getElementById(`btn-${colorId}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                btn.innerHTML = 'Nascondi Registri ▲';
            } else {
                el.classList.add('hidden');
                btn.innerHTML = 'Vedi Registri ▼';
            }
        };

        // Funzione per assegnare un tema in base al nome del colore
        function getStileColore(nomeColore) {
            const c = nomeColore.toLowerCase();
            if(c.includes('blu') || c.includes('azzurr')) return 'border-blue-500 bg-blue-50 text-blue-900';
            if(c.includes('ross')) return 'border-red-500 bg-red-50 text-red-900';
            if(c.includes('verd')) return 'border-green-500 bg-green-50 text-green-900';
            if(c.includes('giall')) return 'border-yellow-400 bg-yellow-50 text-yellow-900';
            if(c.includes('marron')) return 'border-amber-700 bg-amber-50 text-amber-900';
            if(c.includes('viol')) return 'border-purple-500 bg-purple-50 text-purple-900';
            if(c.includes('ros')) return 'border-pink-400 bg-pink-50 text-pink-900';
            if(c.includes('ner')) return 'border-gray-900 bg-gray-200 text-gray-900';
            if(c.includes('bianc')) return 'border-gray-300 bg-white text-gray-800';
            return 'border-indigo-400 bg-indigo-50 text-indigo-900'; // Fallback
        }

        async function calcolaPunteggi() {
            document.getElementById('output').innerHTML = `
                <div class="animate-pulse flex items-center gap-4 font-bold text-indigo-600 bg-white p-8 rounded-3xl shadow-sm border border-indigo-100">
                    <svg class="animate-spin h-6 w-6 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
                    Lettura del database e calcolo incrociato dei punteggi in corso...
                </div>`;

            try {
                const [rgSnap, regSnap] = await Promise.all([
                    db.collection("ragazzi").get(),
                    db.collection("registro").orderBy("data", "desc").get()
                ]);

                // 1. Mappiamo tutti i ragazzi salvando il loro Idsquadra (che è il colore)
                const ragazziList = [];
                rgSnap.forEach(doc => {
                    const r = doc.data();
                    if(r.nome) {
                        ragazziList.push({
                            id: doc.id,
                            nomeOrig: r.nome,
                            nomeLower: r.nome.toLowerCase().trim(),
                            colore: r.Idsquadra ? r.Idsquadra.trim() : 'Senza Colore/Non Assegnato'
                        });
                    }
                });

                // Oggetto per raggruppare i risultati per colore
                const gruppiColori = {};

                // 2. Analizziamo tutto il registro
                regSnap.forEach(doc => {
                    const log = doc.data();
                    if(!log.bersaglio) return;

                    const bersaglioLower = log.bersaglio.toLowerCase().trim();
                    
                    // Cerchiamo a quale ragazzo appartiene questo log (Match esatto o parziale)
                    let ragazzoTrovato = ragazziList.find(r => r.nomeLower === bersaglioLower);
                    if (!ragazzoTrovato) {
                        ragazzoTrovato = ragazziList.find(r => bersaglioLower.includes(r.nomeLower) || r.nomeLower.includes(bersaglioLower));
                    }

                    // Se lo trova prende il colore (Idsquadra), altrimenti lo mette negli "Sconosciuti"
                    const coloreUtente = ragazzoTrovato ? ragazzoTrovato.colore : 'Sconosciuti (Nome non trovato in anagrafica)';
                    const coloreKey = coloreUtente.toUpperCase();

                    if (!gruppiColori[coloreKey]) {
                        gruppiColori[coloreKey] = {
                            nomeVisualizzato: coloreUtente,
                            totalePunti: 0,
                            logs: []
                        };
                    }

                    // Somma i punti
                    const puntiAzione = log.punti ? Number(log.punti) : 0;
                    gruppiColori[coloreKey].totalePunti += puntiAzione;

                    // Formatta la data
                    const dataObj = log.data ? log.data.toDate() : new Date();

                    // Salva il log nella lista di quel colore
                    gruppiColori[coloreKey].logs.push({
                        bersaglioReg: log.bersaglio,
                        nomeVero: ragazzoTrovato ? ragazzoTrovato.nomeOrig : '???',
                        causale: log.causale || 'Nessuna causale',
                        punti: puntiAzione,
                        padrino: log.padrino || 'N/D',
                        dataStr: dataObj.toLocaleDateString('it-IT') + ' ' + dataObj.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'})
                    });
                });

                // Trasformiamo l'oggetto in un array e lo ordiniamo per punteggio decrescente
                const arrayColori = Object.values(gruppiColori).sort((a, b) => b.totalePunti - a.totalePunti);

                // 3. Creiamo l'interfaccia grafica
                let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">';

                arrayColori.forEach((gruppo, index) => {
                    const coloreID = `colore-${index}`;
                    const stileCard = getStileColore(gruppo.nomeVisualizzato);
                    const colorePunti = gruppo.totalePunti >= 0 ? 'text-emerald-600' : 'text-rose-600';
                    const segno = gruppo.totalePunti > 0 ? '+' : '';

                    html += `
                    <div class="bg-white rounded-3xl shadow-sm border-t-[6px] flex flex-col ${stileCard} overflow-hidden">
                        <!-- Intestazione Card -->
                        <div class="p-6 bg-white flex flex-col items-center border-b border-gray-100">
                            <h2 class="text-2xl font-black uppercase tracking-widest text-gray-800 mb-2">${gruppo.nomeVisualizzato}</h2>
                            <div class="text-5xl font-black ${colorePunti}">${segno}${gruppo.totalePunti}</div>
                            <div class="text-xs font-bold text-gray-400 mt-2 uppercase tracking-wider">Punti Totali</div>
                        </div>

                        <!-- Bottone Mostra/Nascondi -->
                        <div class="bg-gray-50 px-6 py-3 border-b border-gray-100">
                            <button id="btn-${coloreID}" onclick="toggleLogs('${coloreID}')" class="w-full text-center text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors">
                                Vedi Registri ▼
                            </button>
                        </div>

                        <!-- Lista Log (Nascosta di default) -->
                        <div id="logs-${coloreID}" class="hidden bg-gray-50 p-4 flex-1">
                            <div class="text-xs font-bold text-gray-500 mb-3 flex justify-between">
                                <span>Movimenti: ${gruppo.logs.length}</span>
                            </div>
                            
                            <div class="space-y-2 max-h-[350px] overflow-y-auto custom-scrollbar pr-2">
                                ${gruppo.logs.map(log => `
                                    <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                        <div class="flex justify-between items-start mb-1.5">
                                            <div class="font-bold text-gray-800 text-sm leading-tight">${log.nomeVero}</div>
                                            <div class="font-black text-sm px-1.5 py-0.5 rounded ${log.punti > 0 ? 'text-emerald-700 bg-emerald-50' : (log.punti < 0 ? 'text-rose-700 bg-rose-50' : 'text-gray-500')} whitespace-nowrap">
                                                ${log.punti > 0 ? '+' : ''}${log.punti} pt
                                            </div>
                                        </div>
                                        <div class="text-[11px] text-gray-600 mb-1 leading-tight">${log.causale}</div>
                                        <div class="text-[10px] text-gray-400 flex justify-between items-center border-t border-dashed pt-1 mt-1">
                                            <span>${log.dataStr}</span>
                                            <span>Da: ${log.padrino}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>`;
                });

                html += '</div>';
                document.getElementById('output').innerHTML = html;

            } catch (error) {
                document.getElementById('output').innerHTML = `<div class="bg-rose-100 text-rose-700 p-6 rounded-2xl font-bold border border-rose-200 text-lg">Errore di caricamento: ${error.message}</div>`;
                console.error(error);
            }
        }

        calcolaPunteggi();
    </script>
</body>
</html>
