<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Bonifica Avanzata Similitudini e Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-2 uppercase tracking-tight text-gray-900">Strumento di Bonifica Avanzato</h1>
        <p class="text-gray-600 mb-8 font-medium">Analisi delle anagrafiche simili (typo, accenti, spazi) con selezione manuale del record da eliminare.</p>
        <div id="output" class="space-y-8"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYnV7Qqj_-iPLvE-KYXT1bCRbe_4seFaw",
            authDomain: "campopostcresima2026.firebaseapp.com",
            projectId: "campopostcresima2026",
            storageBucket: "campopostcresima2026.firebasestorage.app",
            messagingSenderId: "286625257910",
            appId: "1:286625257910:web:734565f023794171e08917"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Stato globale per memorizzare i gruppi analizzati
        window.mappaConflitti = [];

        // Funzione per calcolare la somiglianza tra stringhe (Distanza di Levenshtein)
        function calcolaLevenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1, // Sostituzione
                            matrix[i][j - 1] + 1,     // Inserimento
                            matrix[i - 1][j] + 1      // Cancellazione
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        // Normalizzazione profonda (rimuove spazi, punteggiatura ed accenti/diacritici)
        function normalizzaTesto(stringa) {
            if (!stringa) return "";
            return stringa.toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Rimuove accenti (à -> a)
                .replace(/['"’]/g, "")
                .replace(/\s+/g, "");
        }

        async function analizza() {
            document.getElementById('output').innerHTML = '<div class="animate-pulse flex items-center gap-3 font-bold text-indigo-600 bg-indigo-50 p-6 rounded-2xl"><svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Analisi predittiva e scansione similitudini in corso...</div>';

            try {
                const [rgSnap, regSnap, sqSnap] = await Promise.all([
                    db.collection("ragazzi").get(),
                    db.collection("registro").orderBy("data", "desc").get(),
                    db.collection("squadre").get()
                ]);
                
                // Mappa squadre per colore
                const squadreMap = {};
                sqSnap.forEach(doc => {
                    const sqData = doc.data();
                    if (sqData.colore) {
                        squadreMap[sqData.colore.toLowerCase().trim()] = {
                            id: doc.id,
                            nome: sqData.nome || doc.id,
                            punti: sqData.punti !== undefined ? Number(sqData.punti) : 0
                        };
                    }
                });

                const ragazzi = [];
                rgSnap.forEach(doc => ragazzi.push({ id: doc.id, ...doc.data() }));

                // Raggruppamento per somiglianza fonetica/testuale
                const gruppiSimili = [];
                const visitati = new Set();

                for (let i = 0; i < ragazzi.length; i++) {
                    if (visitati.has(ragazzi[i].id)) continue;
                    
                    let cluster = [ragazzi[i]];
                    const normI = normalizzaTesto(ragazzi[i].nome);
                    if(!normI) continue;

                    for (let j = i + 1; j < ragazzi.length; j++) {
                        if (visitati.has(ragazzi[j].id)) continue;
                        
                        const normJ = normalizzaTesto(ragazzi[j].nome);
                        // Soglia Levenshtein impostata a 2 (copre differenze di accenti, lettere finali saltate o apostrofi)
                        if (calcolaLevenshtein(normI, normJ) <= 2) {
                            cluster.push(ragazzi[j]);
                        }
                    }

                    if (cluster.length > 1) {
                        cluster.forEach(r => visitati.add(r.id));
                        gruppiSimili.push(cluster);
                    }
                }

                window.mappaConflitti = [];
                let html = '';

                if (gruppiSimili.length === 0) {
                    document.getElementById('output').innerHTML = '<div class="bg-white p-6 rounded-3xl shadow-sm text-emerald-600 font-bold text-lg text-center">Nessun nome con anomalie o similitudini sospette trovato! 🎉</div>';
                    return;
                }

                // Generazione dei dati completi per ciascun elemento del gruppo di conflitto
                gruppiSimili.forEach((cluster, gruppoIndex) => {
                    const infoMembri = cluster.map(ragazzo => {
                        let registriSpecifici = [];
                        let puntiTotaliLog = 0;

                        // Estrai i registri dedicati a questo specifico ragazzo
                        regSnap.forEach(doc => {
                            const r = doc.data();
                            if (!r.bersaglio) return;

                            const bersaglioLower = r.bersaglio.toLowerCase().trim();
                            const nomeTargetLower = ragazzo.nome.toLowerCase().trim();

                            if (bersaglioLower === nomeTargetLower || bersaglioLower.includes(`(${nomeTargetLower})`) || bersaglioLower.includes(nomeTargetLower)) {
                                const dataObj = r.data ? r.data.toDate() : new Date();
                                registriSpecifici.push({
                                    id: doc.id,
                                    ...r,
                                    dataFormattata: dataObj.toLocaleDateString('it-IT') + ' ' + dataObj.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'})
                                });
                                if (r.punti) puntiTotaliLog += Number(r.punti);
                            }
                        });

                        // Trova squadra associata al colore di questo utente
                        let squadraTrovata = null;
                        let puntiAttualiSquadra = "N/D";
                        if (ragazzo.colore) {
                            squadraTrovata = squadreMap[ragazzo.colore.toLowerCase().trim()];
                            if (squadraTrovata) puntiAttualiSquadra = squadraTrovata.punti;
                        }

                        return {
                            ragazzo,
                            registri: registriSpecifici,
                            puntiTotaliLog,
                            squadraTrovata,
                            punteggioAttuale: puntiAttualiSquadra
                        };
                    });

                    window.mappaConflitti.push(infoMembri);

                    // Render dell'interfaccia grafica
                    html += `
                    <div class="bg-gray-50 p-1 rounded-3xl border border-gray-200/80 shadow-md overflow-hidden bg-white">
                        <div class="bg-indigo-900 px-6 py-3 text-white font-black uppercase tracking-wider text-sm flex justify-between items-center">
                            <span>Gruppo di Conflitto #${gruppoIndex + 1} (Nomi Simili Rilevati)</span>
                            <span class="bg-indigo-700 px-3 py-0.5 rounded-full text-xs">${infoMembri.length} record coinvolti</span>
                        </div>
                        
                        <div class="p-6 grid grid-cols-1 lg:grid-cols-${infoMembri.length === 2 ? '2' : '1'} gap-6 divider-x divider-gray-200">
                            ${infoMembri.map((m, membroIndex) => {
                                const diffPunti = m.puntiTotaliLog;
                                const segnoDiff = diffPunti > 0 ? '-' : (diffPunti < 0 ? '+' : '');
                                const coloreDiff = diffPunti > 0 ? 'text-rose-600' : (diffPunti < 0 ? 'text-emerald-600' : 'text-gray-500');
                                let puntiDopo = "N/D";
                                if (m.punteggioAttuale !== "N/D") puntiDopo = m.punteggioAttuale - diffPunti;

                                return `
                                <div id="membro-${gruppoIndex}-${membroIndex}" class="flex flex-col justify-between h-full bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                                    <div>
                                        <!-- Dettaglio Anagrafica -->
                                        <div class="flex justify-between items-start border-b pb-3 mb-4">
                                            <div>
                                                <div class="text-xl font-black text-gray-900">${m.ragazzo.nome}</div>
                                                <div class="text-xs text-gray-400 mt-1">ID: <code class="font-mono bg-gray-100 px-1 rounded">${m.ragazzo.id}</code></div>
                                                <div class="text-xs font-bold text-gray-500 mt-0.5">Camera: ${m.ragazzo.camera || 'N/D'}</div>
                                            </div>
                                            <div class="text-right">
                                                <span class="inline-block px-2 py-1 rounded bg-white text-xs font-black border uppercase text-gray-700 shadow-sm">
                                                    🎨 ${m.ragazzo.colore || 'Nessuno'}
                                                </span>
                                                <div class="text-[10px] font-bold text-indigo-600 mt-1 uppercase">${m.squadraTrovata ? m.squadraTrovata.nome : 'Squadra Non Trovata'}</div>
                                            </div>
                                        </div>

                                        <!-- Registri specifici per questo elemento -->
                                        <div class="mb-6">
                                            <div class="text-xs font-black uppercase text-gray-500 tracking-wider mb-2">Registri collegati (${m.registri.length})</div>
                                            ${m.registri.length === 0 ? '<p class="text-xs text-gray-400 italic bg-white p-3 rounded-xl border border-gray-100">Nessun log associato a questa specifica variante di nome.</p>' : ''}
                                            <div class="space-y-1.5 max-h-48 overflow-y-auto pr-1">
                                                ${m.registri.map(reg => `
                                                    <div class="bg-white p-2.5 rounded-xl border border-gray-100 text-xs flex justify-between items-center shadow-2xs">
                                                        <div>
                                                            <div class="font-bold text-gray-800">${reg.causale || 'N/D'}</div>
                                                            <div class="text-[10px] text-gray-400 mt-0.5">${reg.dataFormattata} • Padrino: ${reg.padrino || 'N/D'}</div>
                                                        </div>
                                                        <div class="font-black ${reg.punti > 0 ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'} px-2 py-0.5 rounded text-[11px]">
                                                            ${reg.punti > 0 ? '+' : ''}${reg.punti || 0} pt
                                                        </div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Calcolo impatto e Bottone di eliminazione targettizzato -->
                                    <div class="mt-auto pt-4 border-t border-dashed">
                                        <div class="bg-white rounded-xl p-3 border border-gray-100 grid grid-cols-3 gap-1 text-center text-xs mb-4">
                                            <div>
                                                <div class="text-[10px] uppercase text-gray-400 font-bold mb-0.5">Prima</div>
                                                <div class="font-black text-gray-800">${m.punteggioAttuale}</div>
                                            </div>
                                            <div>
                                                <div class="text-[10px] uppercase text-gray-400 font-bold mb-0.5">Storno</div>
                                                <div class="font-black ${coloreDiff}">${segnoDiff}${Math.abs(diffPunti)}</div>
                                            </div>
                                            <div>
                                                <div class="text-[10px] uppercase text-indigo-500 font-bold mb-0.5">Dopo</div>
                                                <div class="font-black text-indigo-600">${puntiDopo}</div>
                                            </div>
                                        </div>

                                        <button onclick="eseguiBonificaTarget(${gruppoIndex}, ${membroIndex})" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 px-3 rounded-xl text-xs shadow-sm transition-colors flex items-center justify-center gap-1.5">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                            Elimina questo record
                                        </button>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                });

                document.getElementById('output').innerHTML = html;
                
            } catch (error) {
                document.getElementById('output').innerHTML = `<div class="bg-rose-100 text-rose-700 p-4 rounded-xl font-bold border border-rose-200">Errore: ${error.message}</div>`;
                console.error(error);
            }
        }

        // Funzione per eliminare l'elemento specifico scelto dall'utente
        window.eseguiBonificaTarget = async function(gruppoIndex, membroIndex) {
            const target = window.mappaConflitti[gruppoIndex][membroIndex];
            const nomeSquadraAlert = target.squadraTrovata ? target.squadraTrovata.nome : "Nessuna squadra associata";
            
            const conferma = confirm(`CONFERMA ELIMINAZIONE SELEZIONATA:\n\nSei sicuro di voler eliminare questo specifico profilo?\n\nNome: "${target.ragazzo.nome}"\nID: ${target.ragazzo.id}\n\nAzioni eseguite:\n1. Cancellazione definitiva di questo record dalla collezione ragazzi.\n2. Eliminazione di tutti i suoi ${target.registri.length} log dal registro.\n3. Ricalcolo immediato (-${target.puntiTotaliLog} pt) sul campo "punti" della squadra "${nomeSquadraAlert}".`);
            
            if(!conferma) return;

            const cardMembro = document.getElementById(`membro-${gruppoIndex}-${membroIndex}`);
            cardMembro.innerHTML = `<div class="flex items-center justify-center h-full py-12 text-indigo-600 font-bold text-xs animate-pulse">Scrittura atomica batch in corso...</div>`;

            try {
                const batch = db.batch();

                // 1. Elimina i registri legati a questo utente
                target.registri.forEach(reg => {
                    const regRef = db.collection("registro").doc(reg.id);
                    batch.delete(regRef);
                });

                // 2. Aggiorna il totale punti della squadra associata al colore
                if (target.squadraTrovata && target.puntiTotaliLog !== 0) {
                    const sqRef = db.collection("squadre").doc(target.squadraTrovata.id);
                    batch.update(sqRef, {
                        punti: firebase.firestore.FieldValue.increment(-target.puntiTotaliLog)
                    });
                }

                // 3. Elimina il ragazzo selezionato
                const ragazzoRef = db.collection("ragazzi").doc(target.ragazzo.id);
                batch.delete(ragazzoRef);

                // Esegui la transazione
                await batch.commit();

                // Sostituisce la scheda del ragazzo eliminato con un messaggio di successo
                cardMembro.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-center p-6 bg-emerald-50 rounded-xl h-full border border-emerald-100 text-emerald-800">
                        <div class="bg-emerald-200 text-emerald-700 p-2 rounded-full mb-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <div class="font-black text-sm">Record Eliminato!</div>
                        <div class="text-[11px] opacity-80 mt-0.5">Database bonificato e punteggio stornato per la squadra ${nomeSquadraAlert}.</div>
                    </div>`;

            } catch (error) {
                console.error(error);
                alert("Errore durante la bonifica del record selezionato: " + error.message);
                analizza(); // Ricarica tutto in caso di errore
            }
        }
        
        analizza();
    </script>
</body>
</html>
