<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json"> 
    <title>App Campo Post Cresima</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #6366f1; color: #6366f1; font-weight: 900; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        input, select { -webkit-appearance: none; }
    </style>
</head>
<body class="pb-24 text-slate-800">

    <header class="sticky top-0 z-40 bg-indigo-600 px-4 py-3 text-white shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tight">CAMPO 2026</h1>
            <p id="user-display" class="text-xs text-indigo-200 font-semibold"></p>
        </div>
        <button onclick="logout()" class="text-xs bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-lg font-bold transition-all">Esci</button>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        
        <section id="tab-classifica" class="space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Classifica Generale</h2>
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" title="In tempo reale"></div>
            </div>
            <div id="leaderboard-container" class="space-y-3"></div>
        </section>

        <section id="tab-giochi" class="hidden space-y-4">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Assegna Punti</h2>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                <div>
                    <label class="block text-xs font-black uppercase text-slate-400 mb-1">Seleziona Gioco</label>
                    <select id="select-gioco" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm font-bold focus:outline-none focus:border-indigo-500 text-slate-700">
                        <option value="Cocktail Sbagliato">🍹 Cocktail Sbagliato (+10, -5)</option>
                        <option value="Topogun Ball">🔫 Topogun Ball</option>
                        <option value="B/M">⛵ B/M (Bella/Monella)</option>
                        <option value="La Voce del Post Cresima">🎤 La Voce del Post Cresima</option>
                        <option value="Disegna col Dito">🎨 Disegna col Dito</option>
                        <option value="Thriller Night Show">🧟 Thriller Night Show</option>
                        <option value="Roverino">🥏 Roverino</option>
                        <option value="Bagherone">🏐 Bagherone</option>
                        <option value="Dodgeball">🔴 Dodgeball</option>
                        <option value="Scalpo a Squadre">⚔️ Scalpo a Squadre</option>
                        <option value="Staffetta della Collaborazione">🏃 Staffetta della Collaborazione</option>
                        <option value="Cerchia la Squadra">⭕ Cerchia la Squadra</option>
                        <option value="Ispezione Camera">🧹 Ispezione Camera (+10, +5, 0, -5, -10)</option>
                        <option value="Caccia">🏹 Caccia</option>
                        <option value="Bicchieri in Lontananza">🥤 Bicchieri in Lontananza</option>
                        <option value="Giro del Mondo in 80 Minuti">🗺️ Giro del Mondo in 80 Minuti</option>
                        <option value="Gioco dei Numeri">🔢 Gioco dei Numeri</option>
                        <option value="Snake Umano">🐍 Snake Umano</option>
                        <option value="Spongebob">🧽 Spongebob</option>
                        <option value="Lancio dell'Acqua">🎈 Lancio dell'Acqua</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button onclick="apriPuntiSquadre()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all shadow-sm">
                        👥 A Squadra
                    </button>
                    <button onclick="apriPuntiRagazzi()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all shadow-sm">
                        👦 Singolo Ragazzo
                    </button>
                </div>
            </div>
        </section>

        <section id="tab-tabellone" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Tabellone</h2>
                <button id="btn-giorno" onclick="cambiaGiorno()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all">
                    Giorno: -
                </button>
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="p-4 text-xs font-black uppercase text-slate-400">Squadra</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400 text-center">B/M</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400 text-center">Camere</th>
                                <th class="p-4 text-xs font-black uppercase text-slate-400 text-center">Giochi</th>
                            </tr>
                        </thead>
                        <tbody id="tabellone-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-attivita" class="hidden space-y-4">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Cronologia</h2>
            <div id="registro-container" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 py-2 px-4 flex justify-around items-center z-40 shadow-lg max-w-md mx-auto">
        <button onclick="switchTab('classifica')" id="nav-classifica" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-all py-1 px-3">
            <span class="text-xl">🏆</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Classifica</span>
        </button>
        <button onclick="switchTab('giochi')" id="nav-giochi" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-all py-1 px-3">
            <span class="text-xl">🎮</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Assegna</span>
        </button>
        <button onclick="switchTab('tabellone')" id="nav-tabellone" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-all py-1 px-3">
            <span class="text-xl">📊</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Tabellone</span>
        </button>
        <button onclick="switchTab('attivita')" id="nav-attivita" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-all py-1 px-3">
            <span class="text-xl">⏱️</span>
            <span class="text-[10px] font-black uppercase tracking-wider">Attività</span>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            projectId: "campopostcresima-3686e",
            appId: "1:130985558117:web:fb2503d526fa97fa3f79fc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const GIORNI = ['MERCOLEDÌ', 'GIOVEDÌ', 'VENERDÌ', 'SABATO', 'DOMENICA'];
        let indiceGiorno = 0; // Ora questo valore viene sincronizzato in tempo reale da Firestore

        let CURRENT_USER = localStorage.getItem('user_padrino') || "";
        const SQUADRE_FISSE = [
            { id: "rosso", nome: "Rosso", stile: "bg-red-50 text-red-700 border-red-100" },
            { id: "giallo", nome: "Giallo", stile: "bg-amber-50 text-amber-700 border-amber-100" },
            { id: "verde", nome: "Verde", stile: "bg-emerald-50 text-emerald-700 border-emerald-100" },
            { id: "blu", nome: "Blu", stile: "bg-blue-50 text-blue-700 border-blue-100" }
        ];

        let mappaRagazzoSquadra = {};
        let listaRagazzi = [];

        // --- SINCRONIZZAZIONE GIORNO IN TEMPO REALE ---
        db.collection("config").doc("stato").onSnapshot(doc => {
            if (doc.exists && doc.data().indiceGiorno !== undefined) {
                indiceGiorno = doc.data().indiceGiorno;
            } else {
                db.collection("config").doc("stato").set({ indiceGiorno: 0 }, { merge: true });
                indiceGiorno = 0;
            }
            
            // Aggiorna l'etichetta del giorno e ridisegna il tabellone se visibile
            const btnGiorno = document.getElementById('btn-giorno');
            if (btnGiorno) {
                btnGiorno.innerText = `Giorno: ${GIORNI[indiceGiorno]}`;
            }
            if (document.getElementById('tab-tabellone') && !document.getElementById('tab-tabellone').classList.contains('hidden')) {
                renderTabellone();
            }
        }, error => {
            console.error("Errore nella sincronizzazione del giorno:", error);
        });

        async function init() {
            if (!CURRENT_USER) {
                const { value: nomeInput } = await Swal.fire({
                    title: 'Chi sei?',
                    input: 'text',
                    inputPlaceholder: 'Inserisci il tuo nome/soprannome',
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    inputValidator: (value) => { if (!value) return 'Devi inserire un nome!' }
                });
                CURRENT_USER = nomeInput.trim().toUpperCase();
                localStorage.setItem('user_padrino', CURRENT_USER);
            }
            document.getElementById('user-display').innerText = `Padrino: ${CURRENT_USER}`;

            db.collection("squadre").onSnapshot(snap => {
                renderClassifica(snap);
                if(document.getElementById('tab-tabellone').classList.contains('hidden') === false) renderTabellone();
            });

            db.collection("registro").orderBy("data", "desc").limit(40).onSnapshot(snap => {
                renderRegistro(snap);
                if(document.getElementById('tab-tabellone').classList.contains('hidden') === false) renderTabellone();
            });

            const ragazziSnap = await db.collection("ragazzi").get();
            ragazziSnap.forEach(doc => {
                const r = doc.data();
                mappaRagazzoSquadra[r.nome.toLowerCase().trim()] = r.squadra;
                listaRagazzi.push({ nome: r.nome, squadra: r.squadra });
            });
            listaRagazzi.sort((a, b) => a.nome.localeCompare(b.nome));

            switchTab('classifica');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function switchTab(tabId) {
            ['classifica', 'giochi', 'tabellone', 'attivita'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`nav-${tabId}`).classList.add('tab-active');

            if (tabId === 'tabellone') renderTabellone();
        }

        function cambiaGiorno() {
            const prossimoIndice = (indiceGiorno + 1) % GIORNI.length;
            db.collection("config").doc("stato").set({ indiceGiorno: prossimoIndice }, { merge: true })
              .catch(e => Swal.fire('Errore!', 'Impossibile cambiare giorno sul database: ' + e.message, 'error'));
        }

        function renderClassifica(snapshot) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = "";
            let sList = [];
            snapshot.forEach(doc => { sList.push({ id: doc.id, ...doc.data() }); });
            sList.sort((a, b) => b.punti - a.punti);

            sList.forEach((s, idx) => {
                const conf = SQUADRE_FISSE.find(x => x.id === s.id) || { stile: "bg-slate-50 text-slate-700 border-slate-100" };
                const podio = idx === 0 ? "👑" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : "⚡";
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 rounded-2xl border ${conf.stile} shadow-sm transition-all transform hover:scale-[1.01]">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl font-black">${podio}</span>
                            <div>
                                <h3 class="text-lg font-black tracking-tight">${s.nome}</h3>
                                <p class="text-[10px] opacity-75 font-bold uppercase tracking-wider">Squadra #${idx+1}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-3xl font-black tracking-tight">${s.punti}</span>
                            <span class="text-xs font-bold opacity-75 ml-1">pt</span>
                        </div>
                    </div>
                `;
            });
        }

        function renderRegistro(snapshot) {
            const container = document.getElementById('registro-container');
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<p class="text-center text-slate-400 text-sm py-8 font-bold">Nessun punto registrato finora.</p>`;
                return;
            }
            snapshot.forEach(doc => {
                const r = doc.data();
                const sign = r.punti >= 0 ? "+" : "";
                const colorPunti = r.punti > 0 ? "text-emerald-600 bg-emerald-50" : r.punti < 0 ? "text-rose-600 bg-rose-50" : "text-slate-500 bg-slate-50";
                const dataFormat = r.data ? new Date(r.data.toDate()).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : "--:--";

                container.innerHTML += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <div class="space-y-0.5">
                            <h4 class="font-bold text-slate-800 text-sm leading-tight">${r.bersaglio}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${r.causale || 'PUNTEGIO'} • DA ${r.padrino || 'SISTEMA'} • ${dataFormat}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-black px-2.5 py-1 rounded-full ${colorPunti}">${sign}${r.punti}</span>
                            <button onclick="cancellaRegistro('${doc.id}', '${r.bersaglio}', ${r.punti})" class="text-slate-300 hover:text-rose-500 p-1 rounded-lg text-sm transition-all">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        async function cancellaRegistro(idDoc, bersaglio, punti) {
            const res = await Swal.fire({
                title: 'Annullare operazione?',
                text: `Vuoi rimuovere l'assegnazione di ${punti} punti a ${bersaglio}? I punti verranno stornati.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'Sì, annulla',
                cancelButtonText: 'No'
            });
            if (!res.isConfirmed) return;

            try {
                let idSquadraTarget = "";
                const bLower = bersaglio.toLowerCase().trim();

                const sqTrovata = SQUADRE_FISSE.find(x => x.nome.toLowerCase() === bLower || x.id === bLower);
                if (sqTrovata) {
                    idSquadraTarget = sqTrovata.id;
                } else {
                    if (mappaRagazzoSquadra[bLower]) {
                        idSquadraTarget = mappaRagazzoSquadra[bLower];
                    }
                }

                if (idSquadraTarget) {
                    const ref = db.collection("squadre").doc(idSquadraTarget);
                    await ref.update({ punti: firebase.firestore.FieldValue.increment(-punti) });
                }

                await db.collection("registro").doc(idDoc).delete();
                Swal.fire({ title: 'Annullato!', icon: 'success', timer: 1500, showConfirmButton: false });
            } catch (e) {
                Swal.fire('Errore!', e.message, 'error');
            }
        }

        async function renderTabellone() {
            const body = document.getElementById('tabellone-body');
            body.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400 font-bold">Elaborazione dati...</td></tr>`;

            try {
                const sqSnap = await db.collection("squadre").orderBy("punti", "desc").get();
                const regSnap = await db.collection("registro").get();
                body.innerHTML = "";

                sqSnap.forEach(sqDoc => {
                    const sqId = sqDoc.id;
                    const nomeSq = sqDoc.data().nome;

                    let d = { bm: 0, camere: 0, giochi: 0 };

                    regSnap.forEach(regDoc => {
                        const r = regDoc.data();
                        if (!r.bersaglio) return;
                        const bersaglioLower = r.bersaglio.toLowerCase();
                        const nomeSqLower = nomeSq.toLowerCase();

                        // 1. Cerchiamo se il bersaglio contiene il nome di un ragazzo
                        let idSquadraTrovato = null;
                        for (let nomeRagazzo in mappaRagazzoSquadra) {
                            if (bersaglioLower.includes(nomeRagazzo)) {
                                idSquadraTrovato = mappaRagazzoSquadra[nomeRagazzo];
                                break;
                            }
                        }

                        // 2. Verifichiamo l'appartenenza con una logica di uguaglianza stretta (per evitare bug di inclusione parziale)
                        let appartiene = false;
                        if (r.idSquadra) {
                            // Se il record ha il nuovo campo idSquadra, il match è sicuro al 100%
                            appartiene = (String(r.idSquadra).trim() === String(sqId).trim());
